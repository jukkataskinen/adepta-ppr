<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Myyntireskontra — Adepta PPR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{--fd:#0f1923;--fd2:#162231;--pp:#f8f9fb;--ppw:#f0f2f5;--fg:#1D9E75;--fg2:#25b888;--fg3:#5DCAA5;--fl:#2f7fe0;--ink:#1d2433;--inm:#3d4b5e;--inu:#8492a6;--inf:#b0bac9;--bd:#e2e6ee;--bd2:#d1d7e2;--red:#dc3c3c;--amber:#a05c1a;--ambl:#fef3e4;--ffd:'Inter',sans-serif;--ffb:'Inter',sans-serif;--ffm:'JetBrains Mono',monospace;--fpale:rgba(29,158,117,.04);--fmist:rgba(29,158,117,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--ffb);background:var(--pp);color:var(--ink);font-size:14px;min-height:100vh;display:flex;flex-direction:column}
.top{background:var(--fd);color:#fff;padding:12px 24px;display:flex;align-items:center;gap:16px}
.top h1{font-size:15px;font-weight:600;font-family:var(--ffd)}
.top a{color:rgba(255,255,255,.5);text-decoration:none;font-size:12px}
.top a:hover{color:#fff}
.main{max-width:1100px;width:100%;margin:0 auto;padding:24px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:16px}
.card-val{font-size:22px;font-weight:300;font-family:var(--ffd)}
.card-lbl{font-size:11px;color:var(--inu);margin-top:4px}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:6px 10px;font-size:12px;border:1px solid var(--bd);border-radius:6px;background:#fff;outline:none}
.toolbar input:focus{border-color:var(--fl)}
.btn{padding:6px 14px;font-size:12px;font-weight:500;border:none;border-radius:6px;cursor:pointer}
.btn-primary{background:var(--fg);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--bd);color:var(--inm)}
table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--bd)}
thead tr{background:var(--ppw);border-bottom:2px solid var(--bd2)}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--inu);text-transform:uppercase;letter-spacing:.04em}
td{padding:10px 12px;border-bottom:1px solid var(--bd)}
tr:hover{background:var(--fpale)}
.tila-avoin{color:var(--amber);font-weight:600}
.tila-maksettu{color:var(--fg3);font-weight:600}
.tila-myohassa{color:var(--red);font-weight:600}
.upload-box{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:20px;margin-bottom:24px}
.progress-bar{height:3px;background:var(--bd);border-radius:2px;margin:8px 0}
.progress-bar-fill{height:100%;background:var(--fg);border-radius:2px;transition:width .2s}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--fd);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .2s;z-index:999;pointer-events:none}
.toast.sh{opacity:1}
@media(max-width:768px){.cards{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="top">
  <h1>Adepta <em style="color:var(--fg2)">PPR</em> — Myyntireskontra</h1>
  <div style="margin-left:auto;display:flex;gap:16px">
    <a href="/kirjanpito">Kirjanpito</a>
    <a href="/asiakkaat" target="_blank">Asiakkaat</a>
  </div>
</div>

<div class="main">

  <!-- Yhteenvetokortit -->
  <div class="cards" id="resk-cards">
    <div class="card"><div class="card-val" id="rc-avoimet">—</div><div class="card-lbl">Avoimia laskuja</div></div>
    <div class="card"><div class="card-val" id="rc-summa">—</div><div class="card-lbl">Avoin summa</div></div>
    <div class="card"><div class="card-val" id="rc-myohassa">—</div><div class="card-lbl">Myohassa</div></div>
    <div class="card"><div class="card-val" id="rc-maksettu">—</div><div class="card-lbl">Maksettu (kk)</div></div>
  </div>

  <!-- Lataus -->
  <div class="upload-box">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span style="font-size:12px;font-weight:600;color:var(--inu)">Tuo myyntilaskut PDF:sta</span>
      <input type="file" id="resk-file" accept=".pdf" style="font-size:11px">
      <button class="btn btn-primary" onclick="reskLuePdf()">Lue laskut</button>
      <span id="resk-upload-status" style="font-size:11px"></span>
    </div>
    <div id="resk-progress" style="display:none">
      <div class="progress-bar"><div class="progress-bar-fill" id="resk-bar" style="width:0%"></div></div>
      <div id="resk-bar-text" style="font-size:11px;color:var(--inu)"></div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input id="resk-search" type="text" placeholder="Hae asiakas, lasku, viite..." oninput="reskRender()" style="width:220px">
    <select id="resk-filter" onchange="reskRender()">
      <option value="">Kaikki</option>
      <option value="avoin">Avoimet</option>
      <option value="myohassa">Myohassa</option>
      <option value="maksettu">Maksetut</option>
    </select>
    <button class="btn btn-primary" onclick="reskKirjaaAvoimet()" id="resk-kirjaa-btn" style="display:none">Kirjaa paivakirjaan</button>
    <div style="margin-left:auto;font-size:11px;color:var(--inu)" id="resk-count"></div>
  </div>

  <!-- Taulukko -->
  <table>
    <thead><tr>
      <th>Lasku nro</th>
      <th>Asiakas</th>
      <th>Paivamaara</th>
      <th>Erapaiva</th>
      <th style="text-align:right">Summa</th>
      <th>Viite</th>
      <th style="text-align:center">Tila</th>
      <th></th>
    </tr></thead>
    <tbody id="resk-tbody"></tbody>
  </table>

</div>

<div class="toast" id="toast"></div>

<script>
const fmt = v => Math.abs(v).toLocaleString('fi-FI',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPv = iso => { if(!iso) return ''; const [y,m,d]=(iso||'').slice(0,10).split('-'); return d+'.'+m+'.'+y; };
let reskData = [];
let reskLuetut = []; // PDF:sta luetut, ei vielä tallennettu

// Toast
let toastT;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('sh');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('sh'), 2800);
}

// Lataa reskontra API:sta
async function reskLataa() {
  try {
    const res = await fetch('/api/ppr/reskontra');
    if (!res.ok) { console.warn('reskontra fetch:', res.status); return; }
    reskData = await res.json();
    reskRender();
    reskPaivitaKortit();
  } catch(e) { console.warn('reskLataa:', e); }
}

function reskPaivitaKortit() {
  const tanaan = new Date().toISOString().slice(0,10);
  const avoimet = reskData.filter(r => r.tila === 'avoin');
  const myohassa = avoimet.filter(r => r.erapv && r.erapv < tanaan);
  const maksetut = reskData.filter(r => r.tila === 'maksettu');
  const avoinSumma = avoimet.reduce((s,r) => s + Number(r.summa || 0), 0);
  const maksettuSumma = maksetut.reduce((s,r) => s + Number(r.maksettu_summa || r.summa || 0), 0);

  document.getElementById('rc-avoimet').textContent = avoimet.length;
  document.getElementById('rc-summa').textContent = fmt(avoinSumma) + ' \u20ac';
  document.getElementById('rc-myohassa').textContent = myohassa.length;
  document.getElementById('rc-myohassa').style.color = myohassa.length > 0 ? 'var(--red)' : '';
  document.getElementById('rc-maksettu').textContent = fmt(maksettuSumma) + ' \u20ac';
}

function reskRender() {
  const q = (document.getElementById('resk-search').value || '').toLowerCase();
  const filter = document.getElementById('resk-filter').value;
  const tanaan = new Date().toISOString().slice(0,10);

  let list = [...reskData];
  if (q) list = list.filter(r =>
    (r.lasku_nro||'').toLowerCase().includes(q) ||
    (r.ppr_asiakkaat?.nimi||'').toLowerCase().includes(q) ||
    (r.viite||'').includes(q)
  );
  if (filter === 'avoin') list = list.filter(r => r.tila === 'avoin');
  if (filter === 'myohassa') list = list.filter(r => r.tila === 'avoin' && r.erapv && r.erapv < tanaan);
  if (filter === 'maksettu') list = list.filter(r => r.tila === 'maksettu');

  document.getElementById('resk-count').textContent = list.length + ' laskua';

  const tbody = document.getElementById('resk-tbody');
  tbody.innerHTML = '';
  list.forEach(r => {
    const nimi = r.ppr_asiakkaat?.nimi || '—';
    const myohassa = r.tila === 'avoin' && r.erapv && r.erapv < tanaan;
    const tilaCls = r.tila === 'maksettu' ? 'tila-maksettu' : myohassa ? 'tila-myohassa' : 'tila-avoin';
    const tilaText = r.tila === 'maksettu' ? 'Maksettu' : myohassa ? 'Myohassa' : 'Avoin';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-family:var(--ffm);font-weight:600;color:var(--fl)">${r.lasku_nro||'—'}</td>
      <td>${nimi}</td>
      <td style="font-family:var(--ffm);color:var(--inu)">${fmtPv(r.pvm)}</td>
      <td style="font-family:var(--ffm);color:${myohassa?'var(--red)':'var(--inu)'}">${fmtPv(r.erapv)}${myohassa?' \u26a0':''}</td>
      <td style="text-align:right;font-family:var(--ffm);font-weight:600">${fmt(r.summa)} \u20ac</td>
      <td style="font-family:var(--ffm);color:var(--inu)">${r.viite||'—'}</td>
      <td style="text-align:center"><span class="${tilaCls}">${tilaText}</span></td>
      <td>${r.tila==='avoin'?`<button class="btn btn-outline" onclick="reskMerkitseMaksetuksi('${r.id}')" style="font-size:10px;padding:3px 8px">Maksettu</button>`:''}</td>
    `;
    tbody.appendChild(tr);
  });
}

async function reskMerkitseMaksetuksi(id) {
  const tanaan = new Date().toISOString().slice(0,10);
  const r = reskData.find(r => r.id === id);
  try {
    await fetch('/api/ppr/reskontra', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id, tila: 'maksettu', maksettu_pvm: tanaan, maksettu_summa: r?.summa || 0 })
    });
    toast('Merkitty maksetuksi');
    await reskLataa();
  } catch(e) { toast('Virhe: ' + e.message); }
}

// PDF-luku
async function reskLuePdf() {
  const file = document.getElementById('resk-file')?.files?.[0];
  if (!file) { alert('Valitse PDF'); return; }

  const statusEl = document.getElementById('resk-upload-status');
  statusEl.innerHTML = '<span style="color:var(--amber)">\u23f3 Luetaan...</span>';

  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const buf = await file.arrayBuffer();
    const pdfBytes = new Uint8Array(buf);
    const pdf = await pdfjsLib.getDocument({data: pdfBytes}).promise;

    reskLuetut = [];
    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      const yMap = {};
      content.items.forEach(item => {
        const y = Math.round(item.transform[5] / 3) * 3;
        if (!yMap[y]) yMap[y] = [];
        yMap[y].push(item.str);
      });
      const rivit = [];
      Object.keys(yMap).sort((a,b) => b-a).forEach(y => rivit.push(yMap[y].join(' ').trim()));

      const koko = rivit.join(' ');
      const asiakas = (rivit[7]||'').trim();
      const osoite = (rivit[8]||'').trim();
      const kaupunki = (rivit[9]||'').trim();

      let lasku_nro='', pvm='';
      const lm = koko.match(/(\d{9})\s+(\d{2}\.\d{2}\.\d{4})/);
      if (lm) { lasku_nro=lm[1]; pvm=reskPv(lm[2]); }

      let viite='', erapv='';
      const vm = koko.match(/(\d{5}\s\d{5})\s+(\d{2}\.\d{2}\.\d{4})/);
      if (vm) { viite=vm[1].replace(/\s/g,''); erapv=reskPv(vm[2]); }

      let summa=0;
      const sm = koko.match(/Maksettava:\s*([\d\s,]+)\s*\u20ac/i);
      if (sm) summa = parseFloat(sm[1].replace(/\s/g,'').replace(',','.')) || 0;

      if (lasku_nro && summa > 0) {
        reskLuetut.push({ lasku_nro, asiakas, osoite, kaupunki, pvm, erapv, viite, summa });
      }
    }

    statusEl.innerHTML = `<span style="color:var(--fg3)">\u2713 ${reskLuetut.length} laskua luettu (${fmt(reskLuetut.reduce((s,l)=>s+l.summa,0))} \u20ac)</span>`;
    document.getElementById('resk-kirjaa-btn').style.display = reskLuetut.length > 0 ? 'inline-block' : 'none';
    console.log('Reskontra luetut:', reskLuetut.length);
  } catch(e) {
    console.error('reskLuePdf:', e);
    statusEl.innerHTML = `<span style="color:var(--red)">\u2717 ${e.message}</span>`;
  }
}

function reskPv(ddmmyyyy) {
  const m = ddmmyyyy.match(/(\d{2})\.(\d{2})\.(\d{4})/);
  return m ? m[3]+'-'+m[2]+'-'+m[1] : ddmmyyyy;
}

async function reskKirjaaAvoimet() {
  if (!reskLuetut.length) { toast('Ei laskuja kirjattavaksi'); return; }
  const btn = document.getElementById('resk-kirjaa-btn');
  btn.disabled = true; btn.textContent = 'Kirjataan...';
  const progEl = document.getElementById('resk-progress');
  const bar = document.getElementById('resk-bar');
  const barText = document.getElementById('resk-bar-text');
  progEl.style.display = 'block';

  let ok = 0, fail = 0;
  for (let i = 0; i < reskLuetut.length; i++) {
    const l = reskLuetut[i];
    bar.style.width = Math.round((i+1)/reskLuetut.length*100) + '%';
    barText.textContent = `${i+1}/${reskLuetut.length}`;
    try {
      const res = await fetch('/api/ppr/reskontra', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          lasku_nro: l.lasku_nro,
          pvm: l.pvm,
          erapv: l.erapv,
          viite: l.viite,
          summa: l.summa,
          tila: 'avoin',
        })
      });
      if (res.ok) ok++; else fail++;
    } catch(e) { fail++; }
  }

  btn.disabled = false; btn.textContent = 'Kirjaa paivakirjaan';
  toast(`${ok} laskua tallennettu reskontraan` + (fail ? `, ${fail} epäonnistui` : ''));
  reskLuetut = [];
  document.getElementById('resk-kirjaa-btn').style.display = 'none';
  await reskLataa();
}

// Init
reskLataa();
</script>
</body>
</html>
